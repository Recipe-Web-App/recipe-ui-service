name: 🔄 Continuous Integration

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  BUN_VERSION: 'latest'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Job 1: Code Quality & Static Analysis
  code-quality:
    name: 🔍 Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: 📦 Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: 🔧 Install dependencies
        run: bun install --frozen-lockfile

      - name: 🎨 Code formatting check
        run: bun run format:check

      - name: 🔬 ESLint analysis
        run: bun run lint:check

      - name: 📝 TypeScript type checking
        run: bun run type-check

      - name: 🔒 Secret detection
        run: |
          npx secretlint "**/*"
          echo "✅ No secrets detected"

      - name: 📊 Upload ESLint results
        if: always()
        uses: github/super-linter/slim@b807e99ddd37e444d189cfd2c2ca1274d8ae8ef1 # v7
        env:
          DEFAULT_BRANCH: main
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATE_TYPESCRIPT_ES: true
          VALIDATE_CSS: true
          VALIDATE_JSON: true

  # Job 2: Security Scanning
  security-scan:
    name: 🛡️ Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      security-events: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: 📦 Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: 🔧 Install dependencies
        run: bun install --frozen-lockfile

      - name: 🔍 npm audit
        run: |
          npm audit --audit-level=moderate
          echo "✅ No critical vulnerabilities found"

      - name: 🐳 Dockerfile security scan
        if: hashFiles('Dockerfile*') != ''
        run: |
          docker run --rm -i hadolint/hadolint < Dockerfile || true
          echo "✅ Dockerfile security scan completed"

      - name: 🔒 Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: 📤 Upload Trivy results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@b1bff81932f5cdfc8695c7752dcee935dcd061c8 # v4
        with:
          sarif_file: 'trivy-results.sarif'

      - name: 🔐 CodeQL Analysis
        uses: github/codeql-action/analyze@b1bff81932f5cdfc8695c7752dcee935dcd061c8 # v4
        with:
          languages: typescript, javascript

  # Job 3: Unit Tests with Coverage
  unit-tests:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      matrix:
        bun-version: [latest]

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: 📦 Setup Bun ${{ matrix.bun-version }}
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ matrix.bun-version }}

      - name: 🔧 Install dependencies
        run: bun install --frozen-lockfile

      - name: 🧪 Run unit tests
        run: bun run test:unit -- --coverage --watchAll=false
        env:
          CI: true

      - name: 📊 Coverage report
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          flags: unit-tests
          name: unit-tests-node-${{ matrix.node-version }}

      - name: 📈 Coverage comment
        if: github.event_name == 'pull_request' && matrix.node-version == '20'
        uses: romeovs/lcov-reporter-action@87a815f34ec27a5826abba44ce09bbc688da58fd # v0.4.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          lcov-file: ./coverage/lcov.info
          delete-old-comments: true

  # Job 4: Integration Tests
  integration-tests:
    name: 🔗 Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      matrix:
        test-type: [frontend, backend]

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: 📦 Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: 🔧 Install dependencies
        run: bun install --frozen-lockfile

      - name: 🔗 Run ${{ matrix.test-type }} integration tests
        run: bun run test:integration:${{ matrix.test-type }}
        env:
          CI: true

      - name: 📊 Upload test results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: integration-test-results-${{ matrix.test-type }}
          path: |
            coverage/
            test-results/
          retention-days: 7

  # Job 5: Build Verification
  build-verification:
    name: 🏗️ Build Verification
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: 📦 Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: 🔧 Install dependencies
        run: bun install --frozen-lockfile

      - name: 🏗️ Build application
        run: bun run build
        env:
          CI: true

      - name: 📊 Bundle analysis
        run: bun run analyze
        env:
          ANALYZE: true

      - name: 📏 Bundle size check
        run: bun run size-limit

      - name: 🗂️ Cache build artifacts
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: |
            .next/
            out/
          key: ${{ runner.os }}-build-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-build-

      - name: 📤 Upload build artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: build-artifacts
          path: |
            .next/
            out/
          retention-days: 7

  # Job 6: Performance Validation
  performance-validation:
    name: ⚡ Performance Validation
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build-verification

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: 📦 Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: 🔧 Install dependencies
        run: bun install --frozen-lockfile

      - name: 📥 Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: build-artifacts

      - name: 🚀 Start application
        run: |
          bun run start &
          npx wait-on http://localhost:3000 --timeout 60000
        env:
          CI: true

      - name: 📊 Lighthouse CI
        run: bun run perf:lighthouse
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: ⚡ Bundle performance check
        run: bun run perf:bundle

      - name: 📈 Upload performance results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: performance-results
          path: |
            .lighthouseci/
            performance-results/
          retention-days: 30

  # Job 7: Dependency & License Check
  dependency-check:
    name: 📦 Dependency Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: 📦 Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: 🔧 Install dependencies
        run: bun install --frozen-lockfile

      - name: 🔍 Unused dependency check
        run: bun run knip:production

      - name: 🔄 Circular dependency check
        run: bun run madge

      - name: 📄 License compliance check
        run: |
          bunx license-checker --summary --production --excludePrivatePackages
          echo "✅ License compliance verified"

  # Consolidation Job
  ci-success:
    name: ✅ CI Success
    runs-on: ubuntu-latest
    if: always()
    needs:
      - code-quality
      - security-scan
      - unit-tests
      - integration-tests
      - build-verification
      - performance-validation
      - dependency-check

    steps:
      - name: 🎉 All checks passed
        if: ${{ !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') }}
        run: |
          echo "🎉 All CI checks passed successfully!"
          echo "✅ Code quality verified"
          echo "🛡️ Security scan completed"
          echo "🧪 All tests passed"
          echo "🏗️ Build verification successful"
          echo "⚡ Performance validation passed"
          echo "📦 Dependencies verified"

      - name: ❌ Some checks failed
        if: ${{ contains(needs.*.result, 'failure') }}
        run: |
          echo "❌ Some CI checks failed. Please review the logs above."
          exit 1

      - name: 📬 Notify on success
        if: success() && github.ref == 'refs/heads/main'
        uses: 8398a7/action-slack@v3
        with:
          status: success
          text: '✅ CI pipeline completed successfully for ${{ github.repository }}'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: 📬 Notify on failure
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          text: '❌ CI pipeline failed for ${{ github.repository }}'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
